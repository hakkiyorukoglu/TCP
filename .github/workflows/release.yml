name: Publish Release

on:
  push:
    tags:
      - 'v*' # Trigger on version tags, e.g., v1.0.2
  workflow_dispatch: # Allow manual trigger from GitHub web UI

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write # Needed to create a GitHub Release

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore TCP.App/TCP.App.csproj

    - name: Publish App
      # Compiles into a single standalone .exe for Windows x64
      run: dotnet publish TCP.App/TCP.App.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -o output/

    - name: Zip the output
      run: |
        Compress-Archive -Path output\* -DestinationPath TCP-App-win-x64.zip

    - name: Create Release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: TCP-App-win-x64.zip
        generate_release_notes: true

    - name: Create Release (Manual Trigger)
      uses: softprops/action-gh-release@v2
      if: github.event_name == 'workflow_dispatch'
      with:
        tag_name: manual-release-${{ github.run_number }}
        name: Manual Release #${{ github.run_number }}
        files: TCP-App-win-x64.zip
        generate_release_notes: true
